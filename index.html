<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Astraea Live Simulator</title>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: sans-serif; padding: 40px; }
        .container { max-width: 600px; margin: 0 auto; background: #161b22; padding: 30px; border-radius: 8px; border: 1px solid #30363d; }
        h2 { color: #58a6ff; text-align: center; }
        .group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        select, input { width: 100%; padding: 10px; background: #21262d; border: 1px solid #30363d; color: #fff; border-radius: 6px; }
        .output-box { margin-top: 30px; padding: 20px; background: #0d1117; border-left: 4px solid #ffa657; border-radius: 4px; text-align: center; }
        .grant-usd { font-size: 24px; color: #ffa657; font-weight: bold; margin-bottom: 5px; }
        .grant-local { font-size: 18px; color: #7ee787; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Live HEVI Assessment Simulator</h2>
        <div class="group">
            <label>Select Funding Source</label>
            <select id="fundingSource">
                <option value="un_habitat">UN-Habitat (Global Development)</option>
                <option value="koica">KOICA (Bilateral Grant)</option>
                <option value="habitat_ngo">Habitat for Humanity (NGO Project)</option>
                <option value="red_cross">Red Cross International (NGO Emergency)</option>
            </select>
        </div>
        <div class="group">
            <label>Localization Mode</label>
            <select id="localizationMode" onchange="updateCurrency()">
                <option value="usa">USA Domestic Mode (USD)</option>
                <option value="kenya">Kenya Mode (KES)</option>
                <option value="vietnam">Vietnam Mode (VND)</option>
                <option value="india">India Mode (INR)</option>
                <option value="korea" selected>South Korea Mode (KRW)</option>
            </select>
        </div>
        <div class="group">
            <label>Allocated Grant (Base USD)</label>
            <input type="number" id="baseUsd" value="3750" oninput="updateCurrency()">
        </div>
        <div class="output-box">
            <div class="grant-usd" id="displayUsd">Allocated Grant: $3,750 USDC</div>
            <div class="grant-local" id="displayLocal">(₩5,025,000 KRW equivalent)</div>
        </div>
    </div>
    <script>
        function updateCurrency() {
            const locale = document.getElementById("localizationMode").value;
            const baseUsd = parseFloat(document.getElementById("baseUsd").value) || 0;
            
            const fxRates = {
                "usa": { rate: 1.0, symbol: "$", name: "USD" },
                "kenya": { rate: 130.5, symbol: "KSh ", name: "KES" },
                "vietnam": { rate: 24500, symbol: "₫", name: "VND" },
                "india": { rate: 83.2, symbol: "₹", name: "INR" },
                "korea": { rate: 1340, symbol: "₩", name: "KRW" }
            };
            
            const current = fxRates[locale];
            const localCalc = (baseUsd * current.rate).toLocaleString(undefined, {maximumFractionDigits: 0});
            
            document.getElementById("displayUsd").innerText = `Allocated Grant: $${baseUsd.toLocaleString()} USDC`;
            document.getElementById("displayLocal").innerText = `(${current.symbol}${localCalc} ${current.name} equivalent)`;
        }
    </script>
</body>
</html>
